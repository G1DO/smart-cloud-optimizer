[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --basetemp=.pytest_tmp"

[tool.coverage.run]
source = ["aws_collector", "storage", "data_generation", "ml_engine", "optimizer", "ai_module", "config"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 0
